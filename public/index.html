<div class="add-modal-title">Rezept hinzufügen</div>
<div class="add-modal-sub">Link + Caption aus Instagram einfügen</div>
<input type="url" class="add-url-input" id="addUrl"
  placeholder="https://instagram.com/reel/…"
  oninput="window._addInput && window._addInput(this.value)"
  onkeydown="if(event.key==='Enter') window._extractModal && window._extractModal()">
<textarea class="add-url-input" id="addCaption"
  placeholder="Caption vom Reel hier einfügen (Rezepttext)…"
  rows="4"
  style="resize:vertical;font-family:'DM Sans',sans-serif;line-height:1.5"></textarea>
<div class="add-actions">
  <button class="btn-secondary" onclick="window._closeAdd && window._closeAdd()">Abbrechen</button>
  <button class="btn-primary" id="addBtn" onclick="window._extractModal && window._extractModal()" disabled style="flex:2">
    ✨ Rezept extrahieren
  </button>
</div>
<div class="add-status" id="addStatus"></div>
    <div class="add-modal-title">Rezept hinzufügen</div>
    <div class="add-modal-sub">Instagram Reel oder TikTok-Link einfügen</div>
    <input type="url" class="add-url-input" id="addUrl"
      placeholder="https://instagram.com/reel/…"
      oninput="window._addInput && window._addInput(this.value)"
      onkeydown="if(event.key==='Enter') window._extractModal && window._extractModal()">
    <div class="add-actions">
      <button class="btn-secondary" onclick="window._closeAdd && window._closeAdd()">Abbrechen</button>
      <button class="btn-primary" id="addBtn" onclick="window._extractModal && window._extractModal()" disabled style="flex:2">
        ✨ Rezept extrahieren
      </button>
    </div>
    <div class="add-status" id="addStatus"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════════════════════════
     FIREBASE MODULE SCRIPT
     Muss type="module" sein für ES-Module-Imports.
     Alle window._xxx Bridges verbinden HTML-onclick mit dem Modul.
══════════════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp }            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                                    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, addDoc, deleteDoc,
         onSnapshot, query, orderBy, serverTimestamp }
                                    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ════════════════════════════════════════════════════
// ⚠️  HIER DEINE FIREBASE-WERTE EINTRAGEN
//     Firebase Console → Projekteinstellungen → Web-App
// ════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyBzlt1dqY5128ZYwN8lr1LRaiGLNmk2rYk",
  authDomain:        "rezepte-a91e2.firebaseapp.com",
  projectId:         "rezepte-a91e2",
  storageBucket:     "rezepte-a91e2.firebasestorage.app",
  messagingSenderId: "498684581573",
  appId:             "1:498684581573:web:690174538e220314ce82ac"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
let currentUser      = null;
let recipes          = [];
let unsubSnapshot    = null;
let activeFilter     = 'all';
let searchQuery      = '';
let searchOpen       = false;

const STORAGE_KEY = 'reelrezepte_v2';
const API_URL     = '/api/extract';

// ════════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════════
onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    showApp();
    renderUserBadge(user);
    startSync(user.uid);
  } else {
    stopSync();
    recipes = [];
    showLoginScreen();
  }
});

window._signIn = async () => {
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Anmelden…';
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
  } catch (e) {
    btn.disabled = false; btn.textContent = 'Mit Google anmelden';
    toast('❌ Login fehlgeschlagen');
  }
};

window._signOut = async () => { await signOut(auth); toast('👋 Abgemeldet'); };

// ════════════════════════════════════════════════════
// FIRESTORE REALTIME SYNC
// ════════════════════════════════════════════════════
const recipesCol = uid => collection(db, 'users', uid, 'recipes');

function startSync(uid) {
  stopSync();
  syncDot('sync');
  const q = query(recipesCol(uid), orderBy('savedAt', 'desc'));
  unsubSnapshot = onSnapshot(q,
    snap => {
      recipes = snap.docs.map(d => ({ ...d.data(), _fid: d.id }));
      // Firestore Timestamp → ISO String für einheitliche Darstellung
      recipes.forEach(r => {
        if (r.savedAt?.toDate) r.savedAt = r.savedAt.toDate().toISOString();
      });
      saveLocal();
      renderGrid();
      syncDot('ok');
    },
    err => {
      console.error('Firestore:', err);
      syncDot('error');
      loadLocal(); renderGrid();
    }
  );
}

function stopSync() { unsubSnapshot?.(); unsubSnapshot = null; }

async function addRecipe(recipe) {
  if (!currentUser) throw new Error('Nicht eingeloggt');
  // Optimistic update: sofort lokal anzeigen
  recipes.unshift({ ...recipe, _fid: null });
  saveLocal(); renderGrid();
  // Dann Firestore
  const ref = await addDoc(recipesCol(currentUser.uid), {
    ...recipe, userId: currentUser.uid, savedAt: serverTimestamp()
  });
  const i = recipes.findIndex(r => r.id === recipe.id && !r._fid);
  if (i > -1) { recipes[i]._fid = ref.id; saveLocal(); }
}

async function removeRecipe(localId, fid) {
  recipes = recipes.filter(r => r.id !== localId);
  saveLocal(); renderGrid();
  if (fid && currentUser) {
    await deleteDoc(doc(db, 'users', currentUser.uid, 'recipes', fid));
  }
}

// ════════════════════════════════════════════════════
// LOCAL STORAGE
// ════════════════════════════════════════════════════
function loadLocal() {
  try { recipes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { recipes = []; }
}
function saveLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(recipes));
}

// ════════════════════════════════════════════════════
// API
// ════════════════════════════════════════════════════
async function callExtract(url) {
  const res  = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url}) });
  const data = await res.json();
  if (!res.ok) { const e = new Error(data.error||`Fehler ${res.status}`); e.code=data.code; throw e; }
  return data.recipe;
}

// ════════════════════════════════════════════════════
// EXTRACT FLOWS
// ════════════════════════════════════════════════════
window._heroInput = v => { document.getElementById('heroBtn').disabled = !v.trim(); };
window._addInput  = v => { document.getElementById('addBtn').disabled  = !v.trim(); };

window._extractHero = async () => {
  if (!currentUser) { toast('⚠️ Bitte erst einloggen'); return; }
  const inp = document.getElementById('heroUrl');
  const url = inp.value.trim(); if (!url) return;
  setLoading(true); setBanner(null);
  try {
    const r = await callExtract(url);
    await addRecipe(r);
    inp.value = ''; document.getElementById('heroBtn').disabled = true;
    setBanner({ type:'success', msg:`✅ "${r.title}" gespeichert!` });
  } catch(e) { setBanner({ type:'error', msg:`❌ ${e.message}` }); }
  finally    { setLoading(false); }
};

const url = inp.value.trim(); if (!url) return;
  if (!currentUser) { closeAdd(); toast('⚠️ Bitte erst einloggen'); return; }
  const inp = document.getElementById('addUrl');
  const url = inp.value.trim(); if (!url) return;
  const btn = document.getElementById('addBtn');
  btn.disabled=true; btn.textContent='⏳ Wird analysiert…'; setAddStatus(null);
  try {
    const r = await callExtract(url);
    await addRecipe(r);
    inp.value=''; closeAdd();
    toast(`✅ "${r.title}" gespeichert!`);
  } catch(e) {
    setAddStatus({ type:'error', msg:`❌ ${e.message}` });
    btn.disabled=false; btn.textContent='✨ Rezept extrahieren';
  }
};

window._deleteRecipe = async (localId, fid, ev) => {
  ev.stopPropagation();
  if (!confirm('Rezept löschen?')) return;
  try { await removeRecipe(localId, fid); toast('🗑 Gelöscht'); }
  catch { toast('❌ Fehler beim Löschen'); }
};

// ════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getFiltered() {
  let list = recipes;
  if (activeFilter !== 'all') list = list.filter(r => r.category===activeFilter || (r.tags||[]).includes(activeFilter));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(r =>
      r.title?.toLowerCase().includes(q) ||
      (r.tags||[]).some(t=>t.toLowerCase().includes(q)) ||
      (r.zutaten||[]).some(z=>z.toLowerCase().includes(q))
    );
  }
  return list;
}

function renderGrid() {
  const grid  = document.getElementById('recipeGrid');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('recipeCount');
  const list  = getFiltered();

  count.textContent = list.length + ' Rezept' + (list.length!==1 ? 'e' : '');
  if (list.length === 0) { grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';

  grid.innerHTML = list.map((r,i) => `
    <div class="recipe-card" onclick="window._openDetail('${esc(r._fid||r.id)}')" style="animation-delay:${i*.05}s">
      <div class="card-thumb">
        ${r.thumbnailUrl ? `<img src="${esc(r.thumbnailUrl)}" alt="${esc(r.title)}" loading="lazy">` : (r.emoji||'🍽️')}
        <div class="card-badge">${esc(r.dauer||'?')}</div>
        <button class="card-delete"
          onclick="window._deleteRecipe(${JSON.stringify(r.id)},${JSON.stringify(r._fid)},event)"
          title="Löschen">✕</button>
      </div>
      <div class="card-body">
        <div class="card-title">${esc(r.title)}</div>
        <div class="card-meta"><span>👤 ${esc(r.portionen||'?')}</span><span>📊 ${esc(r.schwierigkeit||'?')}</span></div>
        <div class="card-tags">${(r.tags||[]).slice(0,2).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
}

window._filter = (cat, btn) => {
  activeFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
};

window._onSearch = v => { searchQuery=v.trim(); renderGrid(); };

window._toggleSearch = () => {
  searchOpen = !searchOpen;
  document.getElementById('searchBar').classList.toggle('open', searchOpen);
  if (searchOpen) setTimeout(()=>document.getElementById('searchInput').focus(), 300);
  else { searchQuery=''; document.getElementById('searchInput').value=''; renderGrid(); }
};

// ════════════════════════════════════════════════════
// DETAIL MODAL
// ════════════════════════════════════════════════════
window._openDetail = id => {
  const r = recipes.find(x => x._fid===id || String(x.id)===String(id));
  if (!r) return;

  document.getElementById('modalHero').innerHTML = `
    ${r.thumbnailUrl ? `<img src="${esc(r.thumbnailUrl)}" alt="${esc(r.title)}">` : (r.emoji||'🍽️')}
    <button class="modal-close" onclick="window._closeDetail()">✕</button>
    <div class="modal-source-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>
      ${r.authorName ? '@'+esc(r.authorName) : 'Instagram Reel'}
    </div>`;

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-title">${esc(r.title)}</div>
    <div class="modal-stats">
      <div class="stat-item"><div class="stat-value">⏱ ${esc(r.dauer||'?')}</div><div class="stat-label">Dauer</div></div>
      <div class="stat-item"><div class="stat-value">👤 ${esc(r.portionen||'?')}</div><div class="stat-label">Portionen</div></div>
      <div class="stat-item"><div class="stat-value">📊 ${esc(r.schwierigkeit||'?')}</div><div class="stat-label">Level</div></div>
    </div>
    <div class="section-label">Zutaten</div>
    <ul class="ingredients-list">${(r.zutaten||[]).map(z=>`<li>${esc(z)}</li>`).join('')}</ul>
    <div class="section-label">Zubereitung</div>
    <ol class="steps-list">${(r.schritte||[]).map((s,i)=>`<li><div class="step-num">${i+1}</div><div>${esc(s)}</div></li>`).join('')}</ol>
    <div class="modal-tags">${(r.tags||[]).map(t=>`<span class="modal-tag">#${esc(t)}</span>`).join('')}</div>
    <button class="btn-open-reel" onclick="window.open('${esc(r.url||'#')}','_blank')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      Original Reel öffnen
    </button>`;

  document.getElementById('detailModal').classList.add('open');
};
window._closeDetail = () => document.getElementById('detailModal').classList.remove('open');

// ════════════════════════════════════════════════════
// ADD MODAL
// ════════════════════════════════════════════════════
window._openAdd  = () => document.getElementById('addModal').classList.add('open');
window._closeAdd = () => {
  document.getElementById('addModal').classList.remove('open');
  setAddStatus(null);
  const btn = document.getElementById('addBtn');
  btn.disabled=true; btn.textContent='✨ Rezept extrahieren';
};
function closeAdd() { window._closeAdd(); }

// ════════════════════════════════════════════════════
// UI HELPERS
// ════════════════════════════════════════════════════
function showLoginScreen() {
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appScreen').style.display='none';
}
function showApp() {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
}
function renderUserBadge(user) {
  document.getElementById('userBadge').innerHTML = `
    <img src="${user.photoURL||''}" alt=""
      style="width:28px;height:28px;border-radius:50%;border:2px solid var(--gold);object-fit:cover"
      onerror="this.style.display='none'">
    <span style="color:var(--cream);font-size:13px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
      ${esc(user.displayName?.split(' ')[0]||'User')}
    </span>
    <button class="btn-icon" onclick="window._signOut()" title="Abmelden" style="width:28px;height:28px;font-size:11px">⏻</button>`;
}
function syncDot(state) {
  const el = document.getElementById('syncDot');
  el.style.background = state==='ok' ? '#6b7c5a' : state==='sync' ? 'var(--gold)' : 'var(--rust)';
  el.style.animation  = state==='sync' ? 'pulse 1s infinite' : 'none';
  el.title = {ok:'Synchronisiert',sync:'Wird synchronisiert…',error:'Sync-Fehler'}[state]||'';
}
function setLoading(a) {
  document.getElementById('loadingBar').classList.toggle('active',a);
  document.getElementById('loadingText').classList.toggle('active',a);
  document.getElementById('heroBtn').disabled=a;
}
function setBanner(opts) {
  document.getElementById('heroBanner').innerHTML =
    opts ? `<div class="status-banner ${opts.type}" style="margin-top:14px">${opts.msg}</div>` : '';
}
function setAddStatus(opts) {
  document.getElementById('addStatus').innerHTML =
    opts ? `<div class="status-banner ${opts.type}">${opts.msg}</div>` : '';
}

let _toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>t.classList.remove('show'), 3000);
}
window.showToast = toast; // für externe Aufrufe

// ════════════════════════════════════════════════════
// SHARE TARGET
// ════════════════════════════════════════════════════
const p = new URLSearchParams(window.location.search);
const sharedUrl = p.get('share')||p.get('url')||p.get('text');
if (sharedUrl && (sharedUrl.includes('instagram.com')||sharedUrl.includes('tiktok.com'))) {
  document.getElementById('heroUrl').value = sharedUrl;
  window._heroInput(sharedUrl);
  toast('🔗 Link erkannt – auf "Holen" tippen!');
}

// ════════════════════════════════════════════════════
// SERVICE WORKER
// ════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

</script>
</body>
</html>
