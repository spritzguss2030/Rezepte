[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."analyze-image"]
  timeout = 30

[[redirects]]
  from = "/api/analyze"
  to = "/.netlify/functions/analyze-image"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true
