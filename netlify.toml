[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."extract-recipe"]
  timeout = 30

[[redirects]]
  from = "/api/extract"
  to = "/.netlify/functions/extract-recipe"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true
